# 火山方舟 Coding Plan Lite
# 最小档位（基准 = 1×）。
# 厂商级信息见 data/vendors/volcengine.yml。
# 重要：token 总额度目前无任何实测来源，tokens_measured 全部为 null。
# 火山官方公布的"Pro = Lite × 5"是【次数比例】，不是 token 比例，不可据此反推 token。

plan_id: volc-coding-lite
vendor: volcengine            # → data/vendors/volcengine.yml
plan_name: Coding Plan Lite
plan_tier: lite
status: active
last_verified: 2026-07-21

pricing:
  currency: CNY
  # 包月
  original_monthly: 40
  intro_monthly: 9.9        # 限时 9.9 元起首单（2.5 折不到,前 2 个月特惠）
  # 包季（官方页面有,3 个月一口价）
  original_quarterly: 120        # ¥40 × 3 刊例价
  intro_quarterly: 59.80         # 限时特惠,受邀再 9.5 折 = ¥56.81/季
  # 包年（官方页面有,12 个月一口价）
  original_yearly: 480           # ¥40 × 12 刊例价
  intro_yearly: 419.80           # 限时特惠 ¥419.80/年（立省 ¥60.2），受邀再 9.5 折 = ¥398.81/年
  intro_duration_months: 2
  intro_condition: 新用户特惠；同实名主体仅一次
  intro_end_hint: 2026-08-08
  auto_renew_default: true

# 三周期限额
limits:
  window_5h:
    requests_official: 1200
    tokens_measured: null
  window_weekly:
    requests_official: 9000
    tokens_measured: null
  window_monthly:
    requests_official: 18000
    tokens_measured: null

ratio_note: |
  火山官方产品定义：Pro 的【所有档位限额】= Lite × 5（次数比例和 token 比例都遵循，因为是产品定义不是统计估算）。
  当前 Lite 月度 token = Pro 月度实测 (894M) ÷ 5 = 178.8M，按官方比例分摊到 5h/周。
  如果 Pro 月度实测更新，Lite 自动跟随更新（前端在 build-plans 时反推）。

# 实测样本（暂无）
measurements: []
