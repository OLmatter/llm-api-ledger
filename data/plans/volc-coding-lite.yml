# 火山方舟 Coding Plan Lite
# 最小档位（基准 = 1×）。
# 厂商级信息见 data/vendors/volcengine.yml。
# 重要：token 总额度目前无任何实测来源，tokens_measured 全部为 null。
# 火山官方公布的"Pro = Lite × 5"是【次数比例】，不是 token 比例，不可据此反推 token。

plan_id: volc-coding-lite
vendor: volcengine            # → data/vendors/volcengine.yml
plan_name: Coding Plan Lite
plan_tier: lite
status: active
last_verified: 2026-07-21

pricing:
  currency: CNY
  original_monthly: 40
  intro_monthly: 10       # 活动价常见首两月 2.5 折
  intro_duration_months: 2
  intro_condition: 新用户特惠；同实名主体仅一次
  intro_end_hint: 2026-08-08
  auto_renew_default: true

# 三周期限额
limits:
  window_5h:
    requests_official: 1200
    tokens_measured: null
  window_weekly:
    requests_official: 9000
    tokens_measured: null
  window_monthly:
    requests_official: 18000
    tokens_measured: null

ratio_note: |
  火山官方：Pro 的【次数】限额 = Lite × 5。
  但【token 总额度】是否也严格 5×，官方未公布，需独立实测验证。
  在 Lite 拿到至少 1 个可信探针样本前，禁止用 Pro token ÷ 5 反推 Lite token。

# 实测样本（暂无）
measurements: []
