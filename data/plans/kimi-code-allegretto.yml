# Kimi Code Plan Allegretto（热门档 = 20×）
# 2026-07 数据更新：用户社区反馈 95% 用量 = 3.1 亿，反推周 100% = 326M。
# 替代早期社区单点 690M（95% 用量反推比单点采样更接近真实 cap）。

plan_id: kimi-code-allegretto
vendor: kimi
plan_name: Code Plan Allegretto
plan_tier: allegretto
status: active
last_verified: 2026-07-21

pricing:
  currency: CNY
  original_monthly: 199
  yearly_total: 1908
  yearly_monthly_equivalent: 159
  yearly_note: 年付 1908 元，折合 159 元/月
  auto_renew_default: false

limits:
  window_5h:
    requests_official: null
    tokens_measured: null
  window_weekly:
    requests_official: null
    # ⚠ Kimi 官方只标倍数（1×/4×/20×/60×），从不公开绝对 token 数。
    # 此前 yml 曾写 tokens_official_claimed: 1000000000（1000M），无任何官方依据，已删除（铁律 9）。
    tokens_official_claimed: null
    tokens_measured: 508000000             # 508M（两点 median：326M 95% 用量反推 + 690M 单点）
  window_monthly:
    requests_official: null
    tokens_measured: null
    is_unlimited: true

ratio_note: |
  Allegretto 是 Kimi 4 档中唯一有社区实测的。
  当前采用两点 median 508M/周（326M 95% 用量反推 + 690M 单点 = 中位数）。
  两个数据点差距 2.1×，说明用户行为差异显著,取 median 比任一单点更稳健。
  其他 3 档（Andante/Moderato/Allegro）按 Allegretto × 倍率反推。
  ⚠ Kimi 官方不公开绝对 token 数（只标 1×/4×/20×/60× 倍数），所以无法跟"官方标称"对比。
  待 3+ 用户聚合后取中位数,升级到 high credibility。

measurements:
  - measurement_id: m_2026_07_allegretto_95pct_user_report
    source_kind: single_user_probe_95pct   # 95% 用量反推（比单点采样更接近 cap）
    user_hash: pending
    period: 2026-07
    used_tokens: 310000000                 # 3.1 亿（用户实际用量）
    usage_pct: 95                           # 烧到周额度的 95%
    inferred_weekly_tokens: 326000000     # 100% cap = 3.1 亿 ÷ 95%
    credibility: low                        # 单用户社区反馈，无独立交叉验证
    notes: |
      2026-07 社区用户反馈：199 档位周额度 95% 用量 = 3.1 亿 tokens。
      反推 100% 周 cap = 326M（贴近 cap 的高质量数据点）。
      ⚠ 单用户反馈，未独立验证，credibility=low。

  - measurement_id: m_2026_07_community_allegretto_legacy
    source_kind: community_report
    user_hash: pending
    period: 2026-07
    weekly_tokens_measured: 690000000     # 690M（早期社区单点采样）
    credibility: low
    notes: |
      早期社区单点采样（2026-07 中），未明确用量百分比，可能低利用率导致数据偏低。
      跟 95% 用量反推 326M 差距 2.1×。

  - measurement_id: m_2026_07_allegretto_median_summary
    source_kind: aggregate_median          # 多源数据 median 汇总
    user_hash: pending
    period: 2026-07
    sample_size: 2
    weekly_tokens_measured: 508000000     # 508M（326M & 690M 的 median）
    credibility: low                       # 只有 2 个差距 2.1× 的样本，且都是社区单点无交叉验证
    disputed: true                         # 数据点差距大（326M vs 690M，差 2.1×），前端加红色警示
    dispute_note: |
      2 个样本差距 2.1×（326M vs 690M）。
      根因洞察（2026-07-23）：K3 计费结构对使用模式极敏感——
      缓存命中输入 vs 未命中 vs 输出，价格差可达数十倍。
      同样额度，高缓存命中+少输出的用户能跑出 690M，
      低缓存+多输出的用户只能跑 326M。这是 K3 计费结构的必然，不是测量误差。
      ⚠ 具体倍率（传闻 2/20/100 元/M）待 Kimi 官方 Coding Plan 定价页核实，暂不写入。
    notes: |
      2 个不一致的数据:326M、690M,平均后 508M。
      ⚠ 样本数仅 2，且全是社区单点反馈无独立验证，credibility=low。
      差距根因：K3 计费结构（缓存/输出倍率差距大）导致不同使用模式差异显著。
