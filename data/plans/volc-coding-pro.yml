# 火山方舟 Coding Plan Pro
# 档位定义文件（plan definition）。权威：本文件 + 官方活动页快照。
# 实测样本（measurements）来自探针，可信度逐条标注，不进 limits.tokens_measured。

plan_id: volc-coding-pro
vendor: volcengine
vendor_display: 火山方舟
plan_name: Coding Plan Pro
plan_tier: pro
status: active
source_urls:
  - https://www.volcengine.com/product/ark
  - https://www.volcengine.com/docs/82379/1399008
last_verified: 2026-07-21

pricing:
  currency: CNY
  original_monthly: 200
  intro_monthly: 49.9
  intro_duration_months: 2
  intro_condition: 新购 / Lite 升级 Pro / 续费均占用特惠资格；同实名主体仅一次
  intro_end_hint: 2026-08-08   # 活动截至日（参考，以官方页为准）
  auto_renew_default: true
  price_warning: 第 3 个月自动恢复原价 200 元，且自动续费默认开启

# 三周期限额
# 重要口径（不可混淆）：
# - requests_official: 火山官方公布的"请求次数"限额。仅参考，厂商可改定义。
# - tokens_measured:   探针实测推算的 token 总额度。来自 measurements 聚合，单点不可信。
#   tokens_measured 为 null 表示尚无足够样本，榜单展示时不应伪造数字。
limits:
  window_5h:
    requests_official: 6000
    tokens_measured: null
  window_weekly:
    requests_official: 45000
    tokens_measured: null
  window_monthly:
    requests_official: 90000
    tokens_measured: null

# 比例关系（火山官方公布，基于次数，不是 tokens）
# 月 = 2 × 周
# 周 = 7.5 × 5h
ratio_note: 官方公布的次数比例，token 比例需独立实测，不可由次数比例推算

# 实测样本（每个 user_hash 一条，榜单聚合时按可信度加权）
# 可信度分级：
#   single_user_probe   - 单用户探针一次反推（最低）
#   multi_user_average  - 3+ 独立 user_hash 聚合（中）
#   verified_pr         - GitHub PR 验证（最高）
measurements:
  - measurement_id: m_2026_07_single_001
    source_kind: single_user_probe
    user_hash: pending   # 待探针导出 PR 时填入 sha256(token+salt) 前 12 位
    period: 2026-07
    monthly_used_tokens: 804430000      # 804.43M
    monthly_used_pct: 90
    inferred_monthly_cap_tokens: 893800000   # = used / pct，单点反推
    credibility: low
    notes: |
      单用户单月反推，非统计平均。
      真实月度 cap 可能因用户使用强度 / 请求长度分布不同而漂移。
      榜单展示时标"参考值"，不可作为排序硬依据。

# 模型池（火山官方公布）
models:
  - Doubao-Seed-2.0-Code
  - GLM
  - DeepSeek-V3
  - Kimi
  - MiniMax
  - auto   # 自动调度
models_note: 所有档位共用模型池，Auto 自动调度，额度跨模型共享

# 兼容客户端（火山官方公布）
clients:
  - Cursor
  - Cline
  - Claude Code
  - OpenClaw
clients_note: 额度跨工具共享
