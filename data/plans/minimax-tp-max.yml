# MiniMax Token Plan Max
# 中档（Plus = 1×，Max = 3×，Ultra = 11.8×）
# 厂商级信息见 data/vendors/minimax.yml。
# 5h tokens 来自探针实测，月度 tokens 是官方号称（两套口径，榜单并列）。

plan_id: minimax-tp-max
vendor: minimax
plan_name: Token Plan Max
plan_tier: max
status: active
last_verified: 2026-07-21

pricing:
  currency: CNY
  original_monthly: 119
  original_yearly: 1490
  intro_yearly: 1190       # 年付特惠
  intro_note: 年付特惠 1190 元/年（无永久折扣，到期恢复原价）
  auto_renew_default: false

# 三级限额（5h + 周 + 月，三者同时生效）
# 5h / 周 是 burn 测试 145M 纯 input 数据，按真实编程比例折算（input:output ≈ 7.5:1，output 4x 计费）
# 折算系数 = 8.5 / 11.5 ≈ 0.74（比纯 input 少 26%）
limits:
  window_5h:
    requests_official: null
    tokens_measured: 107000000      # 107M（真实编程混合 tokens，= burn 145M × 0.74）
  window_weekly:
    requests_official: null
    tokens_measured: 1070000000     # 1.07B = 5h × 10
  window_monthly:
    requests_official: null
    tokens_official_claimed: 1800000000   # 1.8B（官方 18 亿 M3 token）
    tokens_measured: null

ratio_note: |
  MiniMax Token Plan 三级限额（5h + 周 + 月，三者独立判断同时生效）：
  - 5h：burn 测试纯 input 反推 145M，按真实编程比例折算（input:output=7.5:1，output 4x 计费）≈ 107M 混合 tokens
  - 周 = 10 × 5h = 1.07B
  - 月 = 1.8B M3 token（官方公布 18 亿，全模态池）
  计费逻辑：按 token 单价消耗额度（output ≈ 4× input 价，cache read ≈ 0.2× input 价）。
  burn 测试全 input，真实编程有 output（贵 4 倍），所以实际能跑的混合 tokens 比纯 input 少 26%。
  折算依据：用户真实编程数据 input:output(non-cache) = 745M:99M ≈ 7.5:1。

# 实测样本
measurements:
  - measurement_id: m_2026_07_burn_max_001
    source_kind: single_user_probe
    user_hash: pending
    period: 2026-07-21
    method: burn_quota            # 大 input(200K) + 1 output 烧额度测试
    duration_sec: 866
    total_requests: 950
    h5_used_tokens: 120620000     # 烧到 5h remaining 16%
    h5_used_pct: 83               # 从 99% 起算到 16%
    inferred_h5_cap_tokens: 145330000  # = used / pct，单次反推
    credibility: medium           # 单用户但 burn 测试方法可信（不同于日常使用反推）
    notes: |
      burn 测试：3 并发，866 秒跑 950 个 200K-input 请求。
      5h remaining 从 99% 降到 16%（用掉 83%），反推 5h 纯 input cap = 145M tokens。
      但 burn 全是 input，真实编程有 output（output ≈ 4× input 计费价），按 input:output=7.5:1 折算：
      真实 5h 混合 cap ≈ 107M（比纯 input 少 26%）。
      折算依据：用户真实编程数据 non-cache input:output = 745M:99M。

# 套餐特性
features:
  video_daily_quota: 3   # 视频日额度 3 条/日
  concurrent_agents: "4-5"
