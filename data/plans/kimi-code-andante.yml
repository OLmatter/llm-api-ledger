# Kimi Code Plan Andante（入门档 = 1× 基准）
# 2026-07 实测更新：基于 Allegretto 周 95% 用量反推 326M,按 ÷20 = 16.3M。
# 早期基于 690M 反推 34.5M 已被新数据替代。

plan_id: kimi-code-andante
vendor: kimi
plan_name: Code Plan Andante
plan_tier: andante
status: active
last_verified: 2026-07-21

pricing:
  currency: CNY
  original_monthly: 49
  yearly_total: 468
  yearly_monthly_equivalent: 39
  yearly_note: 年付 468 元，折合 39 元/月（预付优惠）
  auto_renew_default: false

# 限额：5h + 周（Kimi 无月度封顶）
limits:
  window_5h:
    requests_official: null       # 官方不公布
    tokens_measured: null         # 社区浮动大不采信
  window_weekly:
    requests_official: null
    # ⚠ Kimi 官方只标倍数（1×/4×/20×/60×），从不公开绝对 token 数。
    # 此前 yml 曾写 tokens_official_claimed: 50000000（50M），无任何官方依据，已删除（铁律 9）。
    tokens_official_claimed: null
    tokens_measured: null                 # 实测按 Allegretto 326M/20 反推 = 16.3M
  window_monthly:
    requests_official: null
    tokens_measured: null
    is_unlimited: true             # Kimi 无月度封顶

ratio_note: |
  Kimi 无固定换算公式（不像火山/智谱/MiniMax）。
  - 5h：官方不公布，社区浮动 300-1200 次（Andante），不采信
  - 周：官方只标倍数不公开绝对 token 数；实测按 Allegretto 两点 median 508M ÷ 20 = 25.4M
  - 月：无（按周循环刷新）
  倍率（Andante=1）：Moderato=4×，Allegretto=20×，Allegro=60×
  ⚠ 早期 yml 曾写「官方标称 50M token」，无任何官方依据，已删除。

measurements:
  - measurement_id: m_2026_07_allegretto_95pct_user_report
    source_kind: community_report
    user_hash: pending
    period: 2026-07
    source_plan: kimi-code-allegretto
    source_weekly_tokens: 508000000     # 508M（Allegretto 两点 median）
    tier_ratio: 0.05                     # Andante = Allegretto / 20
    inferred_weekly_tokens: 25400000     # 25.4M（基于 508M/20）
    credibility: low                     # 二手反推（基于 Allegretto disputed 数据 ÷ 20），双重弱化
    disputed: true                       # 源头 Allegretto disputed，反推数据自动继承 disputed
    dispute_note: |
      基于 Allegretto disputed 数据（326M vs 690M 差 2.1×）反推，可信度极低。
      差距根因：K3 计费结构对使用模式极敏感（缓存命中 vs 输出价差数十倍），
      不是测量误差。详见 Allegretto dispute_note。
    notes: |
      基于 Allegretto 实测 508M 反推（Allegretto 自身是 2 个 disputed 社区单点的 median）。