# Kimi（月之暗面 Moonshot）原生 Code Plan 厂商元数据
# ⚠️ 区分：火山方舟内调用 Kimi ≠ Kimi 原生套餐，本档是原生官方线路

vendor_id: kimi
vendor_display: Kimi
vendor_display_en: Moonshot
brand_color: "#000000"
homepage: https://kimi.moonshot.cn/membership/code
docs: https://platform.moonshot.cn
last_verified: 2026-07-21

# 邀请码：Kimi 不提供邀请码（无购买优惠）
affiliate: null

# 厂商公共特性
shared_features:
  # 主力模型（榜单对比基准；Kimi 原生 Code Plan 用 K3 系列）
  primary_model: K3
  models:
    - moonshot-k2.7-code
    - moonshot-k2.6-code
  models_note: |
    支持 256K 超长上下文、多模态截图编码。
    区分缓存命中/未命中，长代码库、图片输入会大量消耗 Token。
  clients:
    - Cursor
    - Cline
    - Claude Code
    - ZCode
  clients_note: |
    必须使用 Code 订阅专属 Key；普通按量充值 API Key 不消耗套餐额度。
    原生 Kimi Code 对第三方编辑器限制比火山/智谱严格，部分客户端容易触发风控。
  rate_limit_tiers: [5h, weekly]   # 注意：无官方月度封顶
  rate_limit_note: |
    Kimi 原生规则和火山/GLM/MiniMax 完全不一样：
    - 无官方公开固定「请求次数限额」，只对外描述为 Token 额度制
    - 无公开 5h/周精确数字，不存在固定 `月=n周=n×5h` 换算公式
    - 刷新周期：按【每周】重置额度（不是自然月）
    - 剩余 Token 不清零，结转至下周上限
    - 无官方独立月度硬封顶；长期上限 = 每周额度持续循环使用
  api:
    upstream: https://api.moonshot.cn/v1

# Kimi 特有的 5h 窗口（官方不公布精确数字，社区实测浮动）
community_5h_note: |
  Andante 实测约 300-1200 次浮动，受上下文长短/缓存命中影响极大。
  更高档位同步放大，但没有火山那种精确「周=7.5×5h」固定比例。
  本榜单 5h 列对 Kimi 全部留空（社区数据不可信）。

# K3 旗舰模型定价（官方公布，2026-07-23 核实自 kimi.moonshot.cn 官网）
# 关键：三档价差极大——输出是缓存命中的 50 倍，深度思考拉满 = 吞金兽
# 这解释了榜单上 Allegretto 2 个社区样本差距 2.1×（326M vs 690M）的根因：
# 不同使用模式（缓存命中率 / 输出占比）下，同样额度实测 token 数差数倍
k3_pricing:
  model: kimi-k3
  unit: 1M tokens
  context_window: 1048576
  input_cache_hit: 2.00        # ¥/M，缓存命中（KV 复用）—— 几乎白送
  input_cache_miss: 20.00      # ¥/M，缓存未命中（全新 prefill）—— 10× 缓存命中
  output: 100.00               # ¥/M，输出（decode 生成）—— 50× 缓存命中，吞金兽
  note: |
    输出是缓存命中的 50 倍。深度思考（reasoning）开到最大档位时，
    输出 token 暴涨，额度瞬间被吃光——这就是吞金兽。
    不同用户实测 token 数差 2 倍以上是计费结构决定的，不是测量误差。
  source: https://kimi.moonshot.cn （官网「模型推理定价」页，2026-07-23 复制核实）
